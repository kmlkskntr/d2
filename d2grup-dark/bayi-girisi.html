<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bayi Girişi — D2 GRUP</title>
<meta name="description" content="D2 Grup bayi paneli girişi.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<div class="login-wrap">
  <div class="login-card">
    <a href="index.html" class="logo" style="justify-content:center;text-align:center"><b>D2 GRUP</b><span>AESTHETICS</span></a>
    <div class="login-head" style="margin-top:24px">
      <h2>Bayi Girişi</h2>
      <p>Bayi panelinize erişmek için giriş yapın.</p>
    </div>
    <form onsubmit="return D2.login(event)">
      <div class="field"><label>E-posta</label><input type="email" placeholder="bayi@firma.com" required></div>
      <div class="field"><label>Şifre</label><input type="password" placeholder="••••••••" required></div>
      <div class="login-extra">
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;color:var(--muted);font-size:13px;margin:0"><input type="checkbox" style="width:auto"> Beni hatırla</label>
        <a href="#">Şifremi unuttum</a>
      </div>
      <button type="submit" class="btn btn-gold">GİRİŞ YAP <svg class="arw" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      <div class="form-msg" id="loginMsg"></div>
    </form>
    <div class="divider">veya</div>
    <p style="text-align:center;color:var(--muted);font-size:14px">Henüz bayi değil misiniz?<br><a href="iletisim.html" class="gold" style="font-weight:600">Bayi başvurusu yapın →</a></p>
  </div>
</div>

<div id="site-footer"></div>
<script src="js/main.js"></script>
</body>
</html>
