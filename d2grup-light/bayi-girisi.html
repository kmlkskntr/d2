<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bayi Girişi — D2 Grup</title>
<meta name="description" content="D2 Grup bayi portalı girişi. İş ortaklarımıza özel fiyat, stok ve sipariş yönetimi." />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="site-header"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <a class="brand" href="index.html">D2<small>GRUP</small></a>
    <h1 style="margin-top:14px">BAYİ GİRİŞİ</h1>
    <p class="sub">İş ortağı portalınıza erişmek için giriş yapın.</p>

    <form class="form" data-mock>
      <div class="form-success">Giriş başarılı! Portal demo modunda çalışmaktadır.</div>
      <div class="field"><label>E-posta</label><input type="email" required placeholder="bayi@firma.com" /></div>
      <div class="field"><label>Şifre</label><input type="password" required placeholder="••••••••" /></div>
      <div class="auth-links">
        <label class="check-row" style="font-weight:400"><input type="checkbox" /> Beni hatırla</label>
        <a href="#">Şifremi unuttum</a>
      </div>
      <button type="submit" class="btn btn--dark" style="justify-content:center">GİRİŞ YAP
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </form>

    <p class="auth-foot">Henüz bayi değil misiniz? <a href="iletisim.html">Bayi başvurusu</a> yapın.</p>
  </div>
</div>

<div id="site-footer"></div>
<script src="js/main.js"></script>
</body>
</html>
